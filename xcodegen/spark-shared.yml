name: Spark
configs:
  Debug: debug
  Release: release
options:
  createIntermediateGroups: true
  defaultConfig: Release
  groupSortPosition: top
  deploymentTarget:
    iOS: 15.0
  useBaseInternationalization: false
  groupOrdering:
    - order: [core, spark]
  postGenCommand: sh postGenCommand.sh
targetTemplates:
  EnableUpcomingFeatures:
    settings:
      base:
        OTHER_SWIFT_FLAGS: $(inherited) -enable-upcoming-feature ConciseMagicFile -enable-upcoming-feature BareSlashRegexLiterals -enable-upcoming-feature ExistentialAny

